<!DOCTYPE html>
<html>
	<head>
		{% include head.html %}
		<link rel="stylesheet" href="{{ page.stylesheet }}">
	</head>
	<body>
		<!-- {% include menu.html %} -->
		{% include header.html %}
		<div id="wrapper">
			<div class="section hero" style="background-image: linear-gradient(to bottom, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0.7)), url('{{ page.thumbnail }}');">
				<div class="content full">
					<h1>{{page.title}}</h1>
					<h2>{{page.tagline}}</h2>
					<span class='tictactag'><i data-lucide="{% if page.tag == "Data Visualization" %}bar-chart-3{% elsif page.tag == "Tinkering" %}settings{% elsif page.tag == "Entrepreneurship" %}rocket{% elsif page.tag == "Programming" %}code{% else %}circle{% endif %}"></i>{{page.tag}}</span>
				</div>
			</div>
			<div class="section medium">
				<div class="content">
					{{ content }}
				</div>
			</div>
			{% include footer.html %}
		</div>
	</body>
	{% include d3_foot.html %}
	<script src="{{ page.script }}"></script>
</html>
