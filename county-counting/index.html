		<style>
			:root {
				--bg: #ffffff;
				--surface: rgb(247, 248, 249);
				--border: rgba(0, 5, 10, 0.08);
				--text: rgba(0, 5, 10, 0.9);
				--text2: rgba(0, 5, 10, 0.5);
				--text3: rgba(0, 5, 10, 0.3);
				--accent: rgb(30, 200, 150);
			}
			* { box-sizing: border-box; margin: 0; padding: 0; }
			body {
				font-family: 'DM Sans', sans-serif;
				background: var(--bg);
				color: var(--text);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}
			a { color: var(--text2); text-decoration: none; transition: color 0.2s ease; }
			a:hover { color: var(--text); text-decoration: none; }

			/* HEADER */
			.header {
				position: sticky;
				top: 0;
				z-index: 100;
				padding: 16px 52px 14px;
				display: flex;
				align-items: center;
				gap: 16px;
				border-bottom: 1px solid var(--border);
				background: rgba(255,255,255,0.96);
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
			}
			.header-logo {
				display: flex;
				align-items: center;
				gap: 10px;
				text-decoration: none;
				color: var(--text);
			}
			.header-logo img { height: 28px; width: auto; border-radius: 5px; }
			.header h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.5px; }
			.header h1 span { font-weight: 400; }
			.header-sub { font-size: 10px; color: var(--text3); letter-spacing: 1px; }
			.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

			/* CONTENT */
			.map-section { padding: 36px 52px; flex: 1; }

			/* FOOTER */
			.app-footer {
				display: grid;
				grid-template-columns: 1fr auto 1fr;
				align-items: center;
				padding: 28px 52px;
				border-top: 1px solid var(--border);
				margin-top: auto;
			}
			.app-footer-logo {
				display: flex;
				align-items: center;
				gap: 7px;
				font-size: 13px;
				font-weight: 600;
				color: rgba(0, 5, 10, 0.5);
				text-decoration: none;
				letter-spacing: -0.3px;
			}
			.app-footer-logo:hover { opacity: 0.6; }
			.app-footer-logo img { height: 18px; width: auto; border-radius: 3px; }
			.app-footer-copy { font-size: 12px; color: rgba(0, 5, 10, 0.25); text-align: center; }
			.app-footer-links { display: flex; gap: 20px; justify-content: flex-end; }
			.app-footer-links a { font-size: 12px; font-weight: 500; color: rgba(0, 5, 10, 0.35); }
			.app-footer-links a:hover { color: rgba(0, 5, 10, 0.7); }

			/* RESPONSIVE */
			@media (max-width: 768px) {
				.header { padding: 14px 1.5rem 12px; }
				.hero-banner { padding: 32px 1.5rem 28px; }
				.map-section { padding: 24px 1.5rem; }
				.app-footer { padding: 20px 1.5rem; grid-template-columns: 1fr; gap: 8px; text-align: center; }
				.app-footer-links { justify-content: center; }
			}
		</style>
	</head>
	<body>
		<div class="header">
			<a href="/" class="header-logo">
				<img src="/assets/favicon.png" alt="bdharva">
			</a>
			<div>
				<h1>County <span>Counting</span></h1>
			</div>
			<a href="/" class="header-sub" style="text-decoration:none;color:var(--text3)">by bdharva</a>
			<div class="header-right">
			</div>
		</div>
		<div class="map-section">
			<div class="chart" id="slider"></div>
			<div class="chart" id="legend"></div>
			<div class="chart" id="map"></div>
			<p class="map-footnote">Data from Google location history (2014–present), crunched with GeoPandas, visualized with D3. Work in progress.</p>
		</div>
		<div class="app-footer">
			<a href="/" class="app-footer-logo"><img src="/assets/favicon.png" alt="bdharva">bdharva</a>
			<span class="app-footer-copy">&copy; {{ site.time | date: '%Y' }} Ben Harvatine</span>
			<div class="app-footer-links">
				<a href="https://github.com/bdharva" target="_blank" rel="noopener">GitHub</a>
				<a href="https://www.instagram.com/bdharva/" target="_blank" rel="noopener">Instagram</a>
				<a href="https://twitter.com/bdharva" target="_blank" rel="noopener">X</a>
			</div>
		</div>
		<script>lucide.createIcons();</script>
		<script src="js/map.js"></script>
	</body>
</html>
